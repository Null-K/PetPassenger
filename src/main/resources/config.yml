# 是否启用 petpassenger.use 权限检测
check-permissions: true

# 是否默认启用举起功能
default-enabled: true

# 启用的世界，填 all 表示全部
enabled-worlds:
  - "world"
  - "test"

# 提示文本
messages:
  reload-success: "&f配置文件重载完成 :D"
  enabled: "&7已 &a开启 &7举起动物功能"
  disabled: "&7已 &c关闭 &7举起动物功能"
  thrown: "&7你把生物 &e丢出去 &7了"

# 被举起的生物是否受到摔落伤害
passenger-fall-damage: false

# 举起生物后，保持潜行并左键攻击可以把生物丢出去
# 是否启用丢出功能
throw-enabled: false
# 丢出的力度（水平方向），数值越大丢得越远
throw-power: 1.5
# 丢出时额外的向上抛力，让生物飞出抛物线
throw-up-power: 0.4

# 双击潜行放下生物的判定间隔（毫秒）
# 在这个时间内连续按两次潜行才会放下生物，数值越小要求手速越快
double-sneak-interval: 400

# 动物列表模式
# whitelist 白名单，只有列表里的能被举起
# blacklist 黑名单，列表里的不能被举起
list-mode: "whitelist"

# 允许顶在头上的动物
# 白名单模式下，填写 animals 代表所有动物（animals 全小写）
# 黑名单模式下，填写的动物不能被举起
allowed-animals:
  - "COW"
  - "SHEEP"
  - "PIG"
  - "CHICKEN"
  - "HORSE"
  - "DONKEY"
  - "MULE"
  - "LLAMA"
  - "PARROT"